<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClarityNotes - 登录与注册</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#006b5b",
          "on-primary": "#ffffff",
          surface: "#f6faf7",
          "on-surface": "#181d1b",
          "surface-container": "#ffffff",
          outline: "#6e7a75",
          "outline-variant": "#bdc9c4",
          "on-surface-variant": "#3e4945",
          "secondary-container": "#f1f5f1"
        },
        borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", "2xl": "1.5rem", full: "9999px" },
        fontFamily: { sans: ["Inter", "sans-serif"] },
        fontSize: {
          h1: ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
          h2: ["24px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "600" }],
          "body-md": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
          "label-sm": ["12px", { lineHeight: "1", letterSpacing: "0.02em", fontWeight: "500" }]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .fade-enter-active { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="font-sans text-on-surface min-h-screen bg-surface flex items-center justify-center p-6">
<main class="w-full max-w-[460px]">
  <div class="bg-surface-container rounded-2xl shadow-lg p-8 md:p-10">
    <!-- 切换标签页 -->
    <div class="flex p-1 bg-secondary-container rounded-xl mb-8">
      <button class="flex-1 py-2.5 text-body-md font-medium rounded-lg transition-all duration-300 bg-primary text-on-primary shadow-sm" id="tab-login" onclick="switchTab('login')">登录</button>
      <button class="flex-1 py-2.5 text-body-md font-medium rounded-lg transition-all duration-300 text-on-surface-variant hover:text-on-surface" id="tab-register" onclick="switchTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="form-login" class="space-y-6">
      <h2 class="text-h2 text-on-surface text-center mb-8">欢迎回来</h2>
      <form onsubmit="handleAuth(event, '登录成功')" class="space-y-5">
        <div class="space-y-2">
          <label class="text-label-sm text-on-surface-variant ml-1">邮箱地址</label>
          <input type="email" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md" placeholder="name@company.com" required>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="text-label-sm text-on-surface-variant">密码</label>
            <a href="#" class="text-label-sm text-primary hover:underline">忘记密码？</a>
          </div>
          <input type="password" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md" placeholder="••••••••" required>
        </div>
        <div class="flex items-center gap-2 px-1">
          <input type="checkbox" id="remember" class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer">
          <label for="remember" class="text-body-md text-on-surface-variant cursor-pointer">记住我</label>
        </div>
        <button type="submit" class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-semibold hover:opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary/10">立即登录</button>
      </form>
      <div class="relative py-4">
        <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-outline-variant/30"></span></div>
        <div class="relative flex justify-center text-label-sm uppercase"><span class="px-3 text-on-surface-variant bg-white">或者通过以下方式</span></div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <button class="flex items-center justify-center gap-3 py-3 border border-outline-variant rounded-xl hover:bg-surface transition-all bg-white group"><span class="material-symbols-outlined text-[20px] text-on-surface group-hover:scale-110 transition-transform">cloud</span><span class="text-body-md font-medium">Google</span></button>
        <button class="flex items-center justify-center gap-3 py-3 border border-outline-variant rounded-xl hover:bg-surface transition-all bg-white group"><span class="material-symbols-outlined text-[20px] text-on-surface group-hover:scale-110 transition-transform">phone_iphone</span><span class="text-body-md font-medium">Apple</span></button>
      </div>
    </div>

    <!-- 注册表单 -->
    <div id="form-register" class="space-y-6 hidden">
      <h2 class="text-h2 text-on-surface text-center mb-8">创建您的账户</h2>
      <form onsubmit="handleAuth(event, '注册成功')" class="space-y-4">
        <div class="space-y-1.5"><label class="text-label-sm text-on-surface-variant ml-1">全名</label><input type="text" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md" placeholder="您的姓名" required></div>
        <div class="space-y-1.5"><label class="text-label-sm text-on-surface-variant ml-1">邮箱地址</label><input type="email" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md" placeholder="name@company.com" required></div>
        <div class="space-y-1.5"><label class="text-label-sm text-on-surface-variant ml-1">设置密码</label><input type="password" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md" placeholder="至少 8 位字符" required></div>
        <div class="space-y-1.5"><label class="text-label-sm text-on-surface-variant ml-1">确认密码</label><input type="password" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-body-md" placeholder="重复您的密码" required></div>
        <div class="pt-4"><button type="submit" class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-semibold hover:opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary/10">免费注册</button></div>
      </form>
      <p class="text-center text-label-sm text-on-surface-variant px-2">注册即代表您同意我们的 <a href="#" class="text-primary hover:underline font-medium">服务条款</a> 和 <a href="#" class="text-primary hover:underline font-medium">隐私政策</a>。</p>
    </div>
  </div>
</main>

<script>
  function switchTab(type) {
    const loginForm = document.getElementById('form-login');
    const registerForm = document.getElementById('form-register');
    const loginTab = document.getElementById('tab-login');
    const registerTab = document.getElementById('tab-register');

    if (type === 'login') {
      loginTab.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
      loginTab.classList.remove('text-on-surface-variant');
      registerTab.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
      registerTab.classList.add('text-on-surface-variant');
      registerForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
      loginForm.classList.add('fade-enter-active');
      setTimeout(() => loginForm.classList.remove('fade-enter-active'), 300);
    } else {
      registerTab.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
      registerTab.classList.remove('text-on-surface-variant');
      loginTab.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
      loginTab.classList.add('text-on-surface-variant');
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
      registerForm.classList.add('fade-enter-active');
      setTimeout(() => registerForm.classList.remove('fade-enter-active'), 300);
    }
  }

  function handleAuth(event, message) {
    event.preventDefault();
    const btn = event.submitter;
    const originalText = btn.innerText;
    btn.innerText = "处理中...";
    btn.disabled = true;
    btn.classList.add('opacity-80', 'cursor-not-allowed');
    setTimeout(() => {
      alert(message);
      btn.innerText = originalText;
      btn.disabled = false;
      btn.classList.remove('opacity-80', 'cursor-not-allowed');
    }, 800);
  }
</script>
</body>
</html>
