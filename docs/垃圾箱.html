<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClarityNotes - Trash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'mint-bg': '#f6faf7',
            'mint-text': '#181d1b',
            'mint-muted': '#3e4945',
            'mint-border': '#bdc9c4',
            'mint-accent': '#006856',
            'mint-accent-light': '#007A66',
            'mint-hover': '#E4F5EF',
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined.filled {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* 侧边栏滚动条 */
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #bdc9c4; border-radius: 4px; }
    
    /* 自定义薄荷绿复选框 */
    .custom-checkbox {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid #bdc9c4;
      border-radius: 4px;
      outline: none;
      background-color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .custom-checkbox:hover {
      border-color: #006856;
      background-color: #E4F5EF;
    }
    .custom-checkbox:checked {
      background-color: #006856;
      border-color: #006856;
    }
    .custom-checkbox:checked::after {
      content: "check";
      font-family: 'Material Symbols Outlined';
      font-size: 12px;
      color: white;
      font-weight: bold;
    }
    /* 全选框的半选状态样式 */
    .custom-checkbox:indeterminate {
      background-color: #006856;
      border-color: #006856;
    }
    .custom-checkbox:indeterminate::after {
      content: "remove";
      font-family: 'Material Symbols Outlined';
      font-size: 12px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body class="bg-mint-bg text-mint-text h-screen overflow-hidden relative">

  <div id="app-shell" class="flex h-screen overflow-hidden">

    <aside id="sidebar" class="flex h-screen shrink-0 flex-col border-r border-mint-border/30 bg-mint-bg shadow-sm transition-all duration-250 overflow-hidden w-[280px] opacity-100"
           style="transition-timing-function: cubic-bezier(0.2, 0.9, 0.4, 1.1);">
      <div class="flex flex-col h-full p-5 visible">

        <div class="mb-6" id="user-profile">
          <div class="flex items-center justify-between w-full">

              <div class="flex size-8 shrink-0 items-center justify-center rounded-full bg-mint-accent text-xs font-bold text-white shadow-sm">
                用
              </div>

              <span class="material-symbols-outlined text-mint-muted text-[18px]">expand_more</span>

            <button class="flex size-8 items-center justify-center rounded-lg text-mint-muted transition hover:bg-[#e5e9e6] hover:text-mint-accent ml-1"
                    onclick="toggleSidebar()" type="button" aria-label="折叠侧边栏">
              <span class="material-symbols-outlined text-[18px]">chevron_left</span>

        </div>

        <div class="flex items-center gap-2 mb-6">

            <input class="w-full rounded-md border border-mint-border/40 bg-white py-1.5 pl-9 pr-3 text-sm text-mint-text outline-none transition placeholder:text-mint-border focus:border-mint-accent focus:ring-1 focus:ring-mint-accent"
                   placeholder="搜索文档 / 文件夹" type="text" />

          <button class="flex size-9 shrink-0 items-center justify-center rounded-full bg-mint-accent/10 text-mint-accent transition hover:bg-mint-accent/20 active:scale-95"

              <path d="M2.75 7.25v-1.5c0-.83.67-1.5 1.5-1.5h3.1c.43 0 .84.18 1.12.5l.92 1h6.36c.83 0 1.5.67 1.5 1.5v6.5c0 .83-.67 1.5-1.5 1.5H4.25c-.83 0-1.5-.67-1.5-1.5v-6.5Z" stroke="#6B7280" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.4"/>

  <div id="floating-batch-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-6 rounded-2xl border border-[#2b3531] bg-[#1e2522] px-6 py-3.5 shadow-2xl transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] opacity-0 translate-y-10 pointer-events-none">

        取消

      <button class="flex items-center gap-1.5 rounded-xl bg-red-600 px-4 py-2 text-xs font-semibold text-white shadow-md transition hover:bg-red-500 active:scale-95" type="button">
        <span class="material-symbols-outlined text-[16px]">delete_forever</span>
        <span>确认删除</span>

  <script {="auth-key"}>
    let isBatchMode = false; // 全局多选机制状态锁

    // 侧边栏折叠
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebar-toggle');
      if (sidebar.classList.contains('w-0')) {
        sidebar.classList.remove('w-0', 'opacity-0', 'p-0', 'border-none');
        sidebar.classList.add('w-[280px]', 'opacity-100');
        toggle.classList.add('hidden');
      } else {
        sidebar.classList.add('w-0', 'opacity-0', 'p-0', 'border-none');
        sidebar.classList.remove('w-[280px]', 'opacity-100');
        toggle.classList.remove('hidden');
      }
    }

    // 控制列表行项的下拉气泡菜单
    function toggleDropdown(event, dropdownId) {
      event.stopPropagation(); 
      const targetMenu = document.getElementById(dropdownId);
      const isCurrentlyOpen = !targetMenu.classList.contains('hidden');
      
      closeAllDropdowns();

      if (!isCurrentlyOpen) {
        targetMenu.classList.remove('hidden');
      }
    }

    function closeAllDropdowns() {
      const dropdowns = document.querySelectorAll('[id*="dropdown"]');
      dropdowns.forEach(menu => menu.classList.add('hidden'));
    }

    // 1. 激活多选交互模式
    function enterBatchMode(initialRowIndex) {
      isBatchMode = true;

      // 展开表头全选选框 (无闪烁滑出)
      const headerWrapper = document.getElementById('header-checkbox-wrapper');
      headerWrapper.classList.remove('w-0', 'opacity-0', 'mr-0');
      headerWrapper.classList.add('w-4', 'opacity-100', 'mr-3');
      
      // 展开每一数据行的复选框
      const rows = document.querySelectorAll('.row-item');
      const wrappers = document.querySelectorAll('.checkbox-wrapper');
      wrappers.forEach(w => {
        w.classList.remove('w-0', 'opacity-0', 'mr-0');
        w.classList.add('w-4', 'opacity-100', 'mr-3');
      });

      // 自动勾选引发点击的那一行文件
      if (initialRowIndex !== undefined && rows[initialRowIndex]) {
        const checkbox = rows[initialRowIndex].querySelector('.item-checkbox');
        checkbox.checked = true;
      }

      handleItemCheckboxChange();
      closeAllDropdowns();
    }

    // 2. 退出多选交互模式 (清空状态)
    function exitBatchMode() {
      isBatchMode = false;

      // 收缩并折叠隐藏全选框
      const headerWrapper = document.getElementById('header-checkbox-wrapper');
      headerWrapper.classList.add('w-0', 'opacity-0', 'mr-0');
      headerWrapper.classList.remove('w-4', 'opacity-100', 'mr-3');
      document.getElementById('select-all-checkbox').checked = false;
      document.getElementById('select-all-checkbox').indeterminate = false;
      
      // 收缩并折叠隐藏所有单行复选框，卸载高亮色
      const wrappers = document.querySelectorAll('.checkbox-wrapper');
      wrappers.forEach(w => {
        w.classList.add('w-0', 'opacity-0', 'mr-0');
        w.classList.remove('w-4', 'opacity-100', 'mr-3');
      });

      const checkboxes = document.querySelectorAll('.item-checkbox');
      checkboxes.forEach(box => {
        box.checked = false;
        const row = box.closest('.row-item');
        row.classList.remove('bg-mint-hover/40', 'border-mint-border/40');
      });

      // 驱动底部浮窗隐形
      updateFloatingBarView();
    }

    // 3. 行点击防错分配机制
    function handleRowClick(rowElement) {
      if (!isBatchMode) {
        console.log("标准模式行为：触发打开/预览文件");
        return; 
      }
      // 多选状态下：变为一键勾选/取消行
      const checkbox = rowElement.querySelector('.item-checkbox');
      checkbox.checked = !checkbox.checked;
      handleItemCheckboxChange();
    }

    // 4. 表头全选框联动
    function toggleSelectAll(masterCheckbox) {
      const checkboxes = document.querySelectorAll('.item-checkbox');
      checkboxes.forEach(box => {
        box.checked = masterCheckbox.checked;
        toggleRowHighlight(box);
      });
      updateFloatingBarView();
    }

    // 5. 单个复选框变更级联 (支持 Indeterminate 状态机)
    function handleItemCheckboxChange() {
      const checkboxes = document.querySelectorAll('.item-checkbox');
      const masterCheckbox = document.getElementById('select-all-checkbox');
      
      let checkedCount = 0;
      checkboxes.forEach(box => {
        if (box.checked) checkedCount++;
        toggleRowHighlight(box);
      });

      if (checkedCount === 0) {
        masterCheckbox.checked = false;
        masterCheckbox.indeterminate = false;
      } else if (checkedCount === checkboxes.length) {
        masterCheckbox.checked = true;
        masterCheckbox.indeterminate = false;
      } else {
        masterCheckbox.checked = false;
        masterCheckbox.indeterminate = true; // 显示半选破折号状态
      }

      updateFloatingBarView();
    }

    // 行高亮修饰
    function toggleRowHighlight(checkbox) {
      const row = checkbox.closest('.row-item');
      if (checkbox.checked) {
        row.classList.add('bg-mint-hover/40', 'border-mint-border/40');
      } else {
        row.classList.remove('bg-mint-hover/40', 'border-mint-border/40');
      }
    }

    // 6. 控制底部浮窗的淡入/淡出及数字变更
    function updateFloatingBarView() {
      const floatingBar = document.getElementById('floating-batch-bar');
      const countBadge = document.getElementById('floating-count-badge');
      
      if (isBatchMode) {
        const checkboxes = document.querySelectorAll('.item-checkbox');
        let selectedCount = 0;
        checkboxes.forEach(box => { if (box.checked) selectedCount++; });
        
        countBadge.innerText = selectedCount;

        // 平滑弹起并淡入底部浮窗
        floatingBar.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
        floatingBar.classList.add('opacity-100', 'translate-y-0');
      } else {
        // 向下淡出隐藏浮窗
        floatingBar.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
        floatingBar.classList.remove('opacity-100', 'translate-y-0');
      }
    }

    // 全局防误触：点击空白处闭合单项 Dropdown 菜单
    document.addEventListener('click', (event) => {
      if (!event.target.closest('.dropdown-container')) {
        closeAllDropdowns();
      }
    });
  </script>

</body>
</html>
